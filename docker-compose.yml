name: watchtower

# Local-dev / single-host stack: PostgreSQL, Redis and the FastAPI backend.
# Postgres and Redis are NOT published to the host (the backend reaches them
# over the private compose network), which also avoids clashing with any
# Postgres/Redis already running on the host. Override BACKEND_PORT in .env if
# host port 8000 is taken.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-watchtower_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-watchtower123}
      POSTGRES_DB: ${POSTGRES_DB:-watchtower}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-watchtower_user} -d ${POSTGRES_DB:-watchtower}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: watchtower-backend:latest
    restart: unless-stopped
    # Wait until the datastores report healthy before starting the API. The
    # entrypoint additionally waits + runs migrations as a second safety net.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Built from the Postgres credentials above so there is a single source of
      # truth; the hostnames are the compose service names.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-watchtower_user}:${POSTGRES_PASSWORD:-watchtower123}@postgres:5432/${POSTGRES_DB:-watchtower}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${BACKEND_PORT:-8000}:8000"

volumes:
  pgdata:
  redisdata:
